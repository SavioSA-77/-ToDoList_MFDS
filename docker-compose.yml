version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./dados:/dados
    networks:
      - todo-network

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge
