<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--estrututa básica de documento HTML, associando a página HTML com CSS e definindo título e escalas para dispositivos móveis -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  <link rel="stylesheet" href="cadastro.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Cadastro de Usuário</h1>
      <p>Preencha seus dados para criar uma conta.</p>
      <form action="#" method="post" class="form-cadastro">
        <div class="field-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />
        </div>

        <div class="field-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="exemplo@dominio.com" required />
        </div>

        <div class="field-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required />
        </div>

        <div class="field-group">
          <label for="confirmar-senha">Confirmar senha</label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Repita a senha" required />
        </div>

        <div class="field-group">
          <label for="nascimento">Data de nascimento</label>
          <input type="date" id="nascimento" name="nascimento" />
        </div>

        <button type="submit" class="btn-submit">Criar conta</button>
      </form>
    </section>
  </main>
</body>
</html>
